<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Arc Raiders Blueprint Tracker - Track which blueprints you and your friends own">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BeBlueprintsTracker</title>
  <link rel="preload" href="styles.css" as="style">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header" role="banner">
    <div class="header-content">
      <h1 class="logo">BeBlueprintsTracker</h1>

       <div class="user-selector" role="group" aria-label="Select your user">
         <label class="radio-label">
           <input type="radio" name="user" value="aleks" class="radio-input">
           <span class="radio-text">Aleks</span>
         </label>
         <label class="radio-label">
           <input type="radio" name="user" value="rudi" class="radio-input">
           <span class="radio-text">Rudi</span>
         </label>
         <label class="radio-label">
           <input type="radio" name="user" value="publicsweatyvoid" class="radio-input">
           <span class="radio-text">Su-Nam</span>
         </label>
       </div>

       <div class="view-toggle" role="group" aria-label="View filter">
         <button class="toggle-btn" id="missing-btn" type="button" data-view="missing" aria-pressed="false">Missing Blueprints</button>
         <button class="toggle-btn" id="unlock-btn" type="button" aria-pressed="false" title="Unlock to allow changes">🔒 Locked</button>
       </div>

       <div class="status-message" aria-live="polite" aria-atomic="true">
         <p id="status-text">Select a user to get started</p>
       </div>

        <button class="changelog-btn" id="changelog-btn" type="button" title="View changelog" aria-label="View changelog">📋 Changelog</button>
      </div>
    </header>

   <main class="main-content" role="main">
    <div id="blueprints-container" class="blueprints-container">
      <!-- Blueprints will be rendered here by JavaScript -->
    </div>

    <div id="loading" class="loading-spinner" hidden>
      <div class="spinner"></div>
      <p>Loading blueprints...</p>
    </div>

    <div id="error" class="error-message" hidden role="alert">
      <!-- Error messages will be displayed here -->
    </div>

    <!-- Changelog Popup Modal -->
    <div id="changelog-modal" class="modal" hidden>
      <div class="modal-content">
        <div class="modal-header">
          <h2>Changelog</h2>
          <button class="modal-close" id="changelog-close" type="button" aria-label="Close changelog">✕</button>
        </div>
        <div class="modal-body">
          <div id="changelog-content">
            <p>Loading changelog...</p>
          </div>
        </div>
      </div>
    </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
