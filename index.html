<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Arc Raiders Blueprint Tracker - Track which blueprints you and your friends own">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BeBlueprintsTracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23FF8000'>📋</text></svg>">
  <link rel="preload" href="styles.css" as="style">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
   <header class="header" role="banner">
     <div class="header-content">
       <h1 class="logo">BeBlueprintsTracker</h1>
       <button class="changelog-btn-icon" id="changelog-btn" type="button" title="View changelog" aria-label="View changelog">📋</button>

         <div class="user-selector" role="group" aria-label="Select your user">
           <button type="button" class="user-btn" data-user="aleks">Aleks</button>
           <button type="button" class="user-btn" data-user="rudi">Rudi</button>
           <button type="button" class="user-btn" data-user="publicsweatyvoid">Su-Nam</button>
           <button type="button" class="user-btn" data-user="chrischtn">Chrischtn</button>
         </div>

         <div class="status-message" aria-live="polite" aria-atomic="true">
           <p id="status-text">Select a user to get started</p>
         </div>

       </div>
     </header>

      <main class="main-content" role="main">
       <!-- View Toggle Buttons (Above Overview) -->
       <div class="view-toggle-above" role="group" aria-label="View mode">
         <button class="toggle-btn active" id="overview-view-btn" type="button" aria-pressed="true" title="Show overview grid">Overview</button>
         <button class="toggle-btn" id="list-view-btn" type="button" aria-pressed="false" title="Show list view">List</button>
         <button class="toggle-btn" id="missing-view-btn" type="button" aria-pressed="false" title="Show missing blueprints">Missing</button>
       </div>

       <!-- Unlock Button Row -->
       <div class="unlock-row" role="group" aria-label="Lock state">
         <button class="toggle-btn" id="unlock-btn" type="button" aria-pressed="false" title="Unlock to allow changes">🔒</button>
       </div>

       <!-- Overview Section -->
       <div id="overview-section" class="overview-section">
         <div id="overview-container" class="overview-container">
           <!-- Overview will be rendered here by JavaScript -->
         </div>
       </div>

      <!-- Main Blueprints Section -->
      <div id="blueprints-container" class="blueprints-container" hidden>
        <!-- Blueprints will be rendered here by JavaScript -->
      </div>

    <div id="loading" class="loading-spinner" hidden>
      <div class="spinner"></div>
      <p>Loading blueprints...</p>
    </div>

    <div id="error" class="error-message" hidden role="alert">
      <!-- Error messages will be displayed here -->
    </div>

    <!-- Changelog Popup Modal -->
    <div id="changelog-modal" class="modal" hidden>
      <div class="modal-content">
        <div class="modal-header">
          <h2>Changelog</h2>
          <button class="modal-close" id="changelog-close" type="button" aria-label="Close changelog">✕</button>
        </div>
        <div class="modal-body">
          <div id="changelog-content">
            <p>Loading changelog...</p>
          </div>
        </div>
      </div>
    </div>
   </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
