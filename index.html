<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Arc Raiders Blueprint Tracker - Track which blueprints you and your friends own">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BeBlueprintsTracker</title>
  <link rel="preload" href="styles.css" as="style">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
   <header class="header" role="banner">
     <div class="header-content">
       <h1 class="logo">BeBlueprintsTracker</h1>
       <button class="changelog-btn-icon" id="changelog-btn" type="button" title="View changelog" aria-label="View changelog">📋</button>

         <div class="user-selector" role="group" aria-label="Select your user">
           <button type="button" class="user-btn" data-user="aleks">Aleks</button>
           <button type="button" class="user-btn" data-user="rudi">Rudi</button>
           <button type="button" class="user-btn" data-user="publicsweatyvoid">Su-Nam</button>
           <button type="button" class="user-btn" data-user="chrischtn">Chrischtn</button>
         </div>

         <div class="status-message" aria-live="polite" aria-atomic="true">
           <p id="status-text">Select a user to get started</p>
         </div>

       </div>
     </header>

    <main class="main-content" role="main">
     <!-- Overview Section -->
     <div id="overview-section" class="overview-section" hidden>
       <button id="overview-toggle" class="overview-toggle-btn" type="button" aria-expanded="true" aria-label="Toggle blueprint overview">
         <span class="overview-toggle-icon">▼</span>
         <span class="overview-toggle-text">Blueprint Overview</span>
       </button>
       <div id="overview-content" class="overview-content">
         <div id="overview-container" class="overview-container">
           <!-- Overview will be rendered here by JavaScript -->
         </div>
       </div>
     </div>

     <!-- View Toggle Buttons (Below Overview) -->
     <div class="view-toggle-below" role="group" aria-label="View filter">
       <button class="toggle-btn" id="missing-btn" type="button" data-view="missing" aria-pressed="false">Missing Blueprints</button>
       <button class="toggle-btn" id="unlock-btn" type="button" aria-pressed="false" title="Unlock to allow changes">🔒 Locked</button>
     </div>

     <!-- Main Blueprints Section -->
     <div id="blueprints-container" class="blueprints-container">
       <!-- Blueprints will be rendered here by JavaScript -->
     </div>

    <div id="loading" class="loading-spinner" hidden>
      <div class="spinner"></div>
      <p>Loading blueprints...</p>
    </div>

    <div id="error" class="error-message" hidden role="alert">
      <!-- Error messages will be displayed here -->
    </div>

    <!-- Changelog Popup Modal -->
    <div id="changelog-modal" class="modal" hidden>
      <div class="modal-content">
        <div class="modal-header">
          <h2>Changelog</h2>
          <button class="modal-close" id="changelog-close" type="button" aria-label="Close changelog">✕</button>
        </div>
        <div class="modal-body">
          <div id="changelog-content">
            <p>Loading changelog...</p>
          </div>
        </div>
      </div>
    </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
